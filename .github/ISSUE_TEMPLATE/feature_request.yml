name: 新功能请求
description: 写下您关于新功能的一些建议
title: "[Feat]: "
type: feature
body:
    - type: markdown
      attributes:
          value: "# 新功能请求"
    - type: markdown
      attributes:
          value: "> 如果只是某些想法，而不是具体的新功能，需要在 [Discussions](https://github.com/TouchController/TouchController/discussions/new?category=%E6%83%B3%E6%B3%95) 中提交"
    - type: checkboxes
      id: feature_check
      attributes:
          label: 检查项
          description: 在提交前，请确认以下内容：
          options:
              - label: 此功能未被提出过（可以在[这里](https://github.com/TouchController/TouchController/issues?q=is%3Aissue%20type%3AFeature)进行搜索）
                required: true
              - label: 此功能不在 [Pull Requests](https://github.com/TouchController/TouchController/pulls) 中
                required: true
              - label: 对应项目的最新版本并未添加此功能
                required: true
    - type: dropdown
      id: bug_project
      attributes:
          label: 项目
          description: 出现问题的对应项目
          options:
              - TouchController
              - Combine
              - BlazeRod
              - ArmorStand
              - AuthProxy
              - BlazeSDL
              - PathFlow
              - FastMerger
              - rules_mc
          default: 0
      validations:
          required: true
    - type: input
      id: feature_summary
      attributes:
          label: 简述
          description: 请简要叙述您所希望添加的新功能
          placeholder: |
              <对此功能的简要描述>
    - type: textarea
      id: feature_details
      attributes:
          label: 详细内容
          description: 请详细描述需要此功能的原因，以及此功能的内容
          placeholder: |
              <需要此功能的原因，以及此功能的详细内容>
    - type: markdown
      attributes:
          value: "### 感谢您对 TouchController 的支持！"
