name: Bug report (English)
description: Report bugs you found!
title: "[Bug]: "
labels: [ "bug" ]
body:
    -   type: markdown
        attributes:
            value: "# Bug report"
    -   type: checkboxes
        id: bug_check
        attributes:
            label: Checklist
            description: "Before reporting, please confirm the following:"
            options:
                -   label: This bug has not been reported before (you can search [here](https://github.com/TouchController/TouchController/issues?q=is%3Aissue))
                    required: true
                -   label: The fix for this bug is not in [Pull Requests](https://github.com/TouchController/TouchController/pulls)
                    required: true
                - label: I have updated the related mod to the latest version
                    required: true
    - type: dropdown
      id: bug_mod
      attributes:
          label: Mod
          description: Which mod has this bug.
          options:
              - TouchController
              - ArmorStand
              - BlazeRod
              - AuthProxy
              - BlazeSDL
          default: 0
      validations:
          required: true
    -   type: dropdown
        id: bug_os
        attributes:
            label: Operating System
            description: The operating system you are using. If you choose "other", please explain below.
            options:
                - Android
                - Linux
                - macOS
                - Windows
                - iOS
                - Other
            default: 0
        validations:
            required: true
    -   type: input
        id: bug_version
        attributes:
            label: Version
            description: Related mod's version, Minecraft version and mod loader (Fabric、Forge、NeoForge) with its version
            placeholder: "Mod version: vx.x.x; Minecraft version: x.x.x; Mod loader: ***, version: ***"
        validations:
            required: true
    -   type: textarea
        id: bug_reproducer
        attributes:
            label: Reproduction Steps
            description: Please briefly describe how to trigger this bug.
            placeholder: |
                1. xxx
                2. xxx
                3. xxx
        validations:
            required: true
    -   type: textarea
        id: bug_log
        attributes:
            label: Log
            description: Upload your game logs (usually in `logs` directory at your game folder) as file. Do not paste logs text as text!
        validations:
            required: true
    -   type: markdown
        attributes:
            value: "### Thank you for supporting TouchController!"
